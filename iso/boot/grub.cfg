set timeout=5
set default=0

if loadfont /boot/grub/themes/Libertix/Terminus_24.pf2; then
    loadfont /boot/grub/themes/Libertix/Terminus_16.pf2
    set gfxmode=auto
    insmod gfxterm
    terminal_output gfxterm
    set theme=/boot/grub/themes/Libertix/theme.txt
fi

menuentry "Install Linux Mint (Automatic)" --class linuxmint --class gnu-linux --class os {
    linux /live/vmlinuz boot=live toram components quiet splash silent plymouth.ignore-serial-consoles loglevel=3 systemd.show_status=0 console=ttyS0,115200n8 console=tty1
    initrd /live/initrd.img
}
menuentry "Install (Verbose mode)" --class recovery --class gnu-linux --class os {
    linux /live/vmlinuz boot=live toram components systemd.show_status=1 loglevel=7 console=ttyS0,115200n8 console=tty1
    initrd /live/initrd.img
}

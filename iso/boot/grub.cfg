set timeout=5
set default=0
menuentry "Install Linux Mint (Automatic)" {
    linux /live/vmlinuz boot=live toram components quiet loglevel=3 systemd.show_status=0 console=ttyS0,115200n8 console=tty1
    initrd /live/initrd.img
}
menuentry "Install (Verbose mode)" {
    linux /live/vmlinuz boot=live toram components systemd.show_status=1 loglevel=7 console=ttyS0,115200n8 console=tty1
    initrd /live/initrd.img
}
